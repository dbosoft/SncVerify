name: Bump version after release

on:
  release:
    types: [published]

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0

    - name: Create next version tag
      shell: pwsh
      run: |
        $tag = "${{ github.event.release.tag_name }}" -replace '^v', ''
        $parts = $tag.Split('.')

        # Skip patch releases — only bump on minor/major
        if ([int]$parts[2] -ne 0) {
          Write-Host "Patch release ($tag) — skipping version bump"
          return
        }

        $major = [int]$parts[0]
        $minor = [int]$parts[1] + 1
        $newTag = "v$major.$minor.0-alpha.0"

        Write-Host "Creating tag $newTag"
        git tag $newTag
        git push origin $newTag
