name: Bump version after release

on:
  release:
    types: [published]

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        ref: main

    - name: Bump version.json
      shell: pwsh
      run: |
        $tag = "${{ github.event.release.tag_name }}" -replace '^v', ''
        $parts = $tag.Split('.')
        $major = [int]$parts[0]
        $minor = [int]$parts[1] + 1
        $newVersion = "$major.$minor-alpha.{height}"

        $json = Get-Content version.json | ConvertFrom-Json
        $json.version = $newVersion
        $json | ConvertTo-Json | Set-Content version.json

        Write-Host "Bumped version to $newVersion"

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add version.json
        git commit -m "Bump version to next development cycle"
        git push
